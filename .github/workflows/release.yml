name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          swiftc \
            Models.swift Theme.swift \
            PersistenceManager.swift CalendarManager.swift AppState.swift \
            CalendarPicker.swift \
            SectionTabBar.swift TaskRowView.swift ArchiveSectionView.swift \
            UpdateChecker.swift \
            ThemePickerView.swift SettingsView.swift ExportCardView.swift ContentView.swift \
            ProgressBarApp.swift \
            -parse-as-library \
            -framework SwiftUI \
            -framework AppKit \
            -framework QuartzCore \
            -framework UniformTypeIdentifiers \
            -framework EventKit \
            -o jindu

      - name: Package app bundle
        run: |
          APP="Progress.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp AppBundle/Contents/Info.plist "$APP/Contents/Info.plist"
          cp AppBundle/Contents/Resources/AppIcon.icns "$APP/Contents/Resources/AppIcon.icns"
          cp jindu "$APP/Contents/MacOS/ProgressBar"

          # Copy localization resources
          for lproj in Localization/*.lproj; do
            lname="$(basename "$lproj")"
            mkdir -p "$APP/Contents/Resources/$lname"
            cp "$lproj/"*.strings "$APP/Contents/Resources/$lname/"
          done

          codesign --force --sign - "$APP"
          zip -r "ProgressBar.app.zip" "$APP"

      - name: Generate release notes
        id: notes
        run: |
          # 从 CHANGELOG.md 提取当前版本的发布日志
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            # 如果 CHANGELOG 没有对应版本，用 commit log
            PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
            NOTES=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD -- . ':!*.zip' | grep -v "^- chore: bump")
          fi
          # 写入文件避免多行转义问题
          echo "$NOTES" > /tmp/release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          body_path: /tmp/release_notes.md
          files: ProgressBar.app.zip

name: Release (fallback)

# 默认发布走本地 Scripts/release.sh。
# 此 workflow 仅作 fallback：本地环境不可用时，在 GitHub Actions 页面手动触发。
on:
  workflow_dispatch:
    inputs:
      tag:
        description: '要发布的 tag（需已存在，如 v4.30）'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Extract version from tag
        id: version
        run: echo "version=${TAG#v}" >> $GITHUB_OUTPUT
        env:
          TAG: ${{ inputs.tag }}

      - name: Build
        run: |
          SRC="Sources"
          swiftc \
            "$SRC/Models/Models.swift" "$SRC/Models/Theme.swift" \
            "$SRC/Services/PersistenceManager.swift" "$SRC/Services/CalendarManager.swift" \
            "$SRC/Services/AppState.swift" "$SRC/Services/UpdateChecker.swift" \
            "$SRC/Views/CalendarPicker.swift" "$SRC/Views/SectionTabBar.swift" \
            "$SRC/Views/TaskRowView.swift" "$SRC/Views/ArchiveSectionView.swift" \
            "$SRC/Views/ThemePickerView.swift" "$SRC/Views/SettingsView.swift" \
            "$SRC/Views/ExportCardView.swift" "$SRC/Views/ContentView.swift" \
            "$SRC/App/ProgressBarApp.swift" \
            -parse-as-library \
            -O -whole-module-optimization \
            -framework SwiftUI \
            -framework AppKit \
            -framework QuartzCore \
            -framework UniformTypeIdentifiers \
            -framework EventKit \
            -o jindu

      - name: Package app bundle
        run: |
          APP="Progress.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp AppBundle/Contents/Info.plist "$APP/Contents/Info.plist"
          cp AppBundle/Contents/Resources/AppIcon.icns "$APP/Contents/Resources/AppIcon.icns"
          cp jindu "$APP/Contents/MacOS/ProgressBar"

          # Copy localization resources
          for lproj in Sources/Localization/*.lproj; do
            lname="$(basename "$lproj")"
            mkdir -p "$APP/Contents/Resources/$lname"
            cp "$lproj/"*.strings "$APP/Contents/Resources/$lname/"
          done

          codesign --force --sign - "$APP"

          # 创建 DMG（含 Applications 快捷方式）
          DMG_DIR="dmg_content"
          mkdir -p "$DMG_DIR"
          cp -R "$APP" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create -volname "Progress" -srcfolder "$DMG_DIR" -ov -format UDZO "ProgressBar.dmg"
          rm -rf "$DMG_DIR"

      - name: Generate release notes
        id: notes
        env:
          TAG: ${{ inputs.tag }}
        run: |
          VERSION="${TAG#v}"
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            PREV_TAG=$(git tag --sort=-v:refname | grep -v "^$TAG$" | head -1)
            if [ -n "$PREV_TAG" ]; then
              NOTES=$(git log --pretty=format:"- %s" "$PREV_TAG".."$TAG" | grep -v "^- chore: bump")
            fi
          fi
          if [ -z "$NOTES" ]; then
            NOTES="Release v$VERSION"
          fi
          echo "$NOTES" > /tmp/release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          body_path: /tmp/release_notes.md
          files: ProgressBar.dmg
